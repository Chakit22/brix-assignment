databases:
  - name: brix-postgres
    databaseName: brix
    user: brix
    plan: free
    postgresMajorVersion: '16'

services:
  - type: web
    name: brix-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm ci && npm run build --workspace=apps/api
    preDeployCommand: npm run db:migrate --workspace=apps/api && npm run db:seed --workspace=apps/api
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: '24'
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: brix-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: '10000'
